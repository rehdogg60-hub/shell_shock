<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reh Dogg Games Plus | Shell Shock Arcade</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #02030c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', 'Press Start 2P', monospace;
            padding: 20px;
        }

        /* Arcade Cabinet */
        .cabinet {
            background: linear-gradient(145deg, #0f122e, #050714);
            border-radius: 48px;
            padding: 20px 24px 30px;
            border: 3px solid #ffd966;
            box-shadow: 0 0 0 6px #2a1e3a, 0 20px 40px black, inset 0 0 20px rgba(255, 217, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }

        /* Marquee */
        .marquee {
            text-align: center;
            background: #010a15;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 24px;
            border-bottom: 3px solid #ffcc44;
            box-shadow: inset 0 0 12px gold, 0 6px 0 #3a2e1a;
        }

        .logo {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffd966, #ffaa33, #ff5500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #ffaa33;
        }

        .sub {
            color: #7ffbff;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        /* Score Panel */
        .score-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 24px;
        }

        .card {
            background: #030a1acc;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 8px 12px;
            flex: 1;
            text-align: center;
            border: 1px solid #ffd966;
            box-shadow: 0 5px 0 #001e2a;
        }

        .card-label {
            font-size: 0.7rem;
            color: #8dd0ff;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33;
            font-family: monospace;
        }

        /* Shell Container */
        .shell-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        /* The Cups (Shells) */
        .shell {
            width: 110px;
            height: 130px;
            background: radial-gradient(ellipse at 30% 25%, #e67e22, #b85e0a);
            border-radius: 0 0 35% 35% / 0 0 40% 40%;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.1s;
            position: relative;
            border-bottom: 6px solid #7e3a0a;
            box-shadow: 0 12px 0 #5a2c06, inset 0 2px 8px rgba(255,215,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D inner rim */
        .shell::before {
            content: "";
            position: absolute;
            top: -12px;
            left: 12px;
            width: 80%;
            height: 20px;
            background: #f39c12;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .shell:hover {
            transform: translateY(-6px);
            filter: brightness(1.1);
        }

        .shell.active {
            transform: translateY(-15px);
            background: radial-gradient(ellipse at 30% 25%, #f39c12, #e67e22);
            box-shadow: 0 6px 0 #5a2c06;
        }

        /* The hidden ball (revealed) */
        .shell .ball-icon {
            font-size: 2.8rem;
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }

        .shell.active .ball-icon {
            display: block;
        }

        /* Shake animation during shuffle */
        .shake {
            animation: shellShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shellShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }

        /* Message area */
        .message-area {
            background: #021a24aa;
            border-radius: 60px;
            padding: 12px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            border: 1px solid cyan;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-text {
            text-shadow: 0 0 6px cyan;
        }

        /* Buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .arcade-btn {
            background: #1f1a2e;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffdf8c;
            box-shadow: 0 6px 0 #2a1a3a;
            cursor: pointer;
            transition: 0.05s linear;
            letter-spacing: 2px;
        }

        .arcade-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a1a3a;
        }

        .reset-btn {
            background: linear-gradient(145deg, #2c3e66, #141c3a);
            color: #ffbb66;
        }

        /* mobile */
        @media (max-width: 550px) {
            .shell { width: 85px; height: 100px; }
            .shell .ball-icon { font-size: 2rem; bottom: 6px; }
            .card-value { font-size: 1.2rem; }
            .arcade-btn { padding: 8px 18px; font-size: 0.9rem; }
            .message-area { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="cabinet">
    <div class="marquee">
        <div class="logo">🔥 REH DOGG: SHELL SHOCK 🔥</div>
        <div class="sub">⚡ FIND THE BALL · COMBO STREAK ⚡</div>
    </div>

    <div class="score-panel">
        <div class="card"><div class="card-label">🎲 SCORE</div><div class="card-value" id="scoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🏆 HIGH SCORE</div><div class="card-value" id="highScoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🎯 STREAK</div><div class="card-value" id="streakDisplay">0</div></div>
    </div>

    <div class="shell-container" id="shellContainer">
        <div class="shell" data-index="0" id="shell0"></div>
        <div class="shell" data-index="1" id="shell1"></div>
        <div class="shell" data-index="2" id="shell2"></div>
    </div>

    <div class="message-area" id="gameMessage">
        <span class="message-text">🕹️ PRESS START TO PLAY 🕹️</span>
    </div>

    <div class="controls">
        <button class="arcade-btn" id="startBtn">🌀 START GAME</button>
        <button class="arcade-btn reset-btn" id="resetBtn">🔄 RESET SCORE</button>
    </div>
</div>

<script>

    // ----------------------------- AUDIO (safe arcade beeps) -----------------------------
    const SafeAudioContext = window.AudioContext || window.webkitAudioContext || null;
    let audioCtx = null;
    let soundEnabled = true;

    function initAudio() {
        if (!SafeAudioContext) {
            soundEnabled = false;
            return;
        }
        try {
            if (!audioCtx) audioCtx = new SafeAudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch (e) {
            soundEnabled = false;
        }
    }

    function playBeep(freq = 880, duration = 0.12, volume = 0.2) {
        if (!audioCtx || !soundEnabled) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.value = volume;
            osc.type = 'sine';
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function playWin() {
        playBeep(880, 0.1, 0.25);
        setTimeout(() => playBeep(1100, 0.12, 0.25), 80);
        setTimeout(() => playBeep(1320, 0.15, 0.2), 160);
    }

    function playLose() {
        playBeep(440, 0.2, 0.22);
        setTimeout(() => playBeep(330, 0.25, 0.2), 150);
    }

    function playShuffle() {
        playBeep(660, 0.05, 0.15);
        setTimeout(() => playBeep(550, 0.05, 0.15), 60);
        setTimeout(() => playBeep(440, 0.05, 0.15), 120);
    }

    // ----------------------------- SAFE STORAGE -----------------------------
    const STORAGE_KEY = 'rehdogg_shell_highscore';

    function safeGetHighScore() {
        try {
            const saved = window.localStorage ? localStorage.getItem(STORAGE_KEY) : null;
            const value = parseInt(saved, 10);
            return Number.isFinite(value) ? value : 0;
        } catch (e) {
            return 0;
        }
    }

    function safeSetHighScore(value) {
        try {
            if (window.localStorage) localStorage.setItem(STORAGE_KEY, String(value));
        } catch (e) {
            // Some browsers block localStorage from local files/private mode.
            // The game should continue even if saving is unavailable.
        }
    }

    // ----------------------------- GAME STATE -----------------------------
    let ballLocation = -1;
    let gameActive = false;
    let score = 0;
    let highScore = 0;
    let streak = 0;
    let isShuffling = false;
    let autoRoundTimer = null;

    // DOM elements
    const shells = document.querySelectorAll('.shell');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const streakDisplay = document.getElementById('streakDisplay');
    const messageSpan = document.querySelector('#gameMessage .message-text');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    function setMessage(text, color = "#0ff") {
        messageSpan.innerHTML = text;
        messageSpan.style.color = color;
    }

    function loadHighScore() {
        highScore = safeGetHighScore();
        highScoreDisplay.innerText = highScore;
    }

    function saveHighScore() {
        if (score > highScore) {
            highScore = score;
            highScoreDisplay.innerText = highScore;
            safeSetHighScore(highScore);
        }
    }

    function updateScoreUI() {
        scoreDisplay.innerText = score;
        streakDisplay.innerText = streak;
        saveHighScore();
    }

    function addBallIcons() {
        shells.forEach(shell => {
            if (!shell.querySelector('.ball-icon')) {
            }
        });
    }

    function hideAllBalls() {
        shells.forEach(shell => {
            shell.classList.remove('active');
        });
    }

    function revealBall() {
        if (ballLocation >= 0 && ballLocation < shells.length) {
            shells[ballLocation].classList.add('active');
        }
    }

    function animateShuffle(callback) {
        if (isShuffling) return;
        isShuffling = true;
        gameActive = false;
        shells.forEach(s => s.classList.add('shake'));
        playShuffle();

        setTimeout(() => {
            shells.forEach(s => s.classList.remove('shake'));
            isShuffling = false;
            if (callback) callback();
        }, 450);
    }

    function startGame() {

    if (isShuffling) return;
    clearTimeout(autoRoundTimer);
    initAudio();

    hideAllBalls();

    // choose where ball starts
    ballLocation = Math.floor(Math.random() * 3);

    // reveal to player first
    shells[ballLocation].classList.add('active');

    gameActive = false;

    messageSpan.innerHTML =
    "👀 WATCH THE BALL CAREFULLY 👀";

    messageSpan.style.color = "#7ffbff";

    // give player time to see it
    setTimeout(()=>{

        hideAllBalls();

        messageSpan.innerHTML =
        "🌀 SHUFFLING... FOLLOW THE CUP 🌀";

        animateRealShuffle(()=>{

            gameActive = true;

            messageSpan.innerHTML =
            "🎯 PICK THE CUP 🎯";

            messageSpan.style.color =
            "#ffd966";

        });

    },1800);
        function animateRealShuffle(callback){

    isShuffling=true;

    let moves=8;
    let count=0;

    let interval=setInterval(()=>{

        playShuffle();

        let a=Math.floor(Math.random()*3);
        let b=Math.floor(Math.random()*3);

        while(a===b){
            b=Math.floor(Math.random()*3);
        }

        // swap ball with shell
        if(ballLocation===a){
            ballLocation=b;
        }
        else if(ballLocation===b){
            ballLocation=a;
        }

        shells[a].style.order=b;
        shells[b].style.order=a;

        count++;

        if(count>=moves){

            clearInterval(interval);

            isShuffling=false;

            callback();

        }

    },400);

}

}

        hideAllBalls();
        ballLocation = Math.floor(Math.random() * shells.length);
        setMessage("🌀 SHUFFLING SHELLS... 🌀", "#ffd966");

        animateShuffle(() => {
            hideAllBalls();
            gameActive = true;
            setMessage("🎯 PICK A CUP! 🎯", "#ffd966");
        });
    }

    function chooseCup(index) {
        initAudio();

        if (isShuffling) {
            setMessage("⏳ SHUFFLING... WAIT ⏳", "#ffd966");
            return;
        }

        if (!gameActive) {
            setMessage("⚠️ PRESS START GAME FIRST! ⚠️", "#ffaa88");
            return;
        }

        revealBall();
        gameActive = false;

        if (index === ballLocation) {
            score += 10 + (streak * 2);
            streak++;
            updateScoreUI();
            playWin();
            setMessage(`🎉 CORRECT! SCORE BONUS! STREAK ${streak}! 🎉`, "#8cff4f");
            autoRoundTimer = setTimeout(startGame, 1200);
        } else {
            streak = 0;
            updateScoreUI();
            playLose();
            setMessage(`❌ WRONG! BALL WAS UNDER CUP ${ballLocation + 1}. ❌`, "#ff7777");
            autoRoundTimer = setTimeout(startGame, 1800);
        }
    }

    function resetScore() {
        clearTimeout(autoRoundTimer);
        score = 0;
        streak = 0;
        updateScoreUI();
        hideAllBalls();
        gameActive = false;
        isShuffling = false;
        setMessage("✨ SCORE RESET! PRESS START ✨", "#ffd966");
    }

    function bindEvents() {
        shells.forEach((shell, idx) => {
            shell.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                chooseCup(idx);
            });
        });

        startBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            startGame();
        });

        resetBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            initAudio();
            resetScore();
        });
    }

    // initial setup
    addBallIcons();
    bindEvents();
    loadHighScore();
    updateScoreUI();
    hideAllBalls();
    setMessage("🕹️ PRESS START GAME TO BEGIN 🕹️", "#0ff");

    document.body.addEventListener('pointerdown', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });

</script>
</body>
</html>
